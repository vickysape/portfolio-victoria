<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victoria Sapelli — DAM & Ciberseguridad</title>
  <style>
    /* ... (Mantenemos todo tu CSS igual) ... */
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');
    :root {
      --bg: #060910; --bg-2: #0a0e17; --bg-3: #0f1520; --surface: #131c2a;
      --surface-2: #1a2538; --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14); --text: #eef2f7;
      --text-2: #9aabb8; --text-3: #5a6e7e; --accent: #00e5b8;
      --accent-2: #3d8ef0; --accent-warn: #f5a623;
      --accent-glow: rgba(0,229,184,0.08);
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 14px; --radius-lg: 22px; --nav-h: 70px;
    }
    /* (He omitido el resto del CSS para no alargar el mensaje, pero mantenlo todo) */
  </style>
</head>
<body>
  <!-- ... (Mantenemos todo tu HTML igual hasta el final) ... -->

  <script>
    // ... (Tus funciones de menu, canvas y scroll se quedan igual) ...

    // --- LÓGICA DEL CHAT CORREGIDA ---
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatBox = document.getElementById('chatBox');
    let history = [];

    async function getBotReply() {
      const message = chatInput.value.trim();
      if (!message) return;

      // Desactivar botón y mostrar que está "escribiendo"
      sendBtn.disabled = true;
      appendMessage('user', message);
      chatInput.value = '';
      showTyping();

      try {
        // LLAMADA A TU PROPIA API (BACKEND SEGURO)
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            message: message,
            history: history 
          })
        });

        const data = await res.json();
        removeTyping();

        if (data.reply) {
          appendMessage('bot', data.reply);
          history.push({ role: 'user', content: message });
          history.push({ role: 'assistant', content: data.reply });
        } else {
          throw new Error('Sin respuesta');
        }

      } catch (err) {
        removeTyping();
        appendMessage('bot', 'Hubo un problema de conexión. Puedes contactar a Victoria directamente en vickysape@hotmail.com 💌');
      } finally {
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }

    function appendMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${role}`;
      msgDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing';
      typingDiv.className = 'msg bot';
      typingDiv.innerHTML = '<div class="msg-bubble">...</div>';
      chatBox.appendChild(typingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    sendBtn.addEventListener('click', getBotReply);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') getBotReply();
    });
  </script>
</body>
</html>
