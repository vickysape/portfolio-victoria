<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victoria Sapelli — DAM & Ciberseguridad</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

    :root {
      --bg: #060910;
      --bg-2: #0a0e17;
      --bg-3: #0f1520;
      --surface: #131c2a;
      --surface-2: #1a2538;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
      --text: #eef2f7;
      --text-2: #9aabb8;
      --text-3: #5a6e7e;
      --accent: #00e5b8;
      --accent-2: #3d8ef0;
      --accent-warn: #f5a623;
      --accent-glow: rgba(0,229,184,0.08);
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius: 14px;
      --radius-lg: 22px;
      --nav-h: 70px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    /* NAV */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      background: rgba(6,9,16,0.88);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 34px;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-2);
    }

    .nav-cta {
      background: var(--accent) !important;
      color: var(--bg) !important;
      padding: 8px 22px;
      border-radius: 100px;
      font-weight: 600;
    }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding-top: var(--nav-h);
    }

    #heroCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
      pointer-events: none;
    }

    /* PROJECTS FIX */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      grid-auto-rows: 1fr;
      gap: 22px;
    }

    .pcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100%;
    }

    /* CHAT PANEL (DEDUPED - SINGLE VERSION) */
    #chat-panel {
      position: fixed;
      bottom: 100px;
      right: 24px;
      width: 320px;
      height: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      z-index: 300;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      transition: 0.25s ease;
    }

    #chat-panel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <nav id="navbar">
    <div class="nav-logo">MVS</div>
    <ul class="nav-links">
      <li><a href="#sobre-mi">Sobre mí</a></li>
      <li><a href="#habilidades">Skills</a></li>
      <li><a href="#experiencia">Experiencia</a></li>
      <li><a href="#proyectos">Proyectos</a></li>
      <li><a href="#contacto" class="nav-cta">Contacto</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <canvas id="heroCanvas"></canvas>
  </section>

  <!-- CHAT PANEL -->
  <div id="chat-panel">
    <div style="padding:12px 16px; border-bottom:1px solid var(--border);">
      <strong>Asistente</strong>
    </div>

    <div id="chat-messages" style="flex:1; padding:14px; overflow-y:auto;"></div>

    <div style="display:flex; border-top:1px solid var(--border);">
      <textarea id="chat-input"></textarea>
      <button id="chat-send">➤</button>
    </div>
  </div>

  <script>
    const chatBtn = document.getElementById('chat-btn');
    const chatPanel = document.getElementById('chat-panel');

    chatBtn?.addEventListener('click', () => {
      chatPanel.classList.toggle('open');
    });
  </script>

</body>
</html>
